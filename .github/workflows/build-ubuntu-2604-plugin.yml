name: Build Ubuntu 26.04 LTS QEMU-UAE PPC plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  BUILD_DIR: ${{ github.workspace }}/build/ubuntu-26.04
  ARTIFACT_DIR: ${{ github.workspace }}/artifacts/ubuntu-26.04
  DEBIAN_FRONTEND: noninteractive

jobs:
  build-ubuntu-2604-plugin:
    name: Build Ubuntu 26.04 LTS plugin
    runs-on: ubuntu-24.04
    container:
      image: ubuntu:26.04

    steps:
      - name: Install build dependencies
        run: |
          set -euo pipefail

          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            file \
            git \
            libglib2.0-dev \
            meson \
            ninja-build \
            patch \
            pkg-config \
            python3 \
            python3-venv \
            tar \
            xz-utils

      - name: Checkout QEMU-UAE PPC plugin builder
        uses: actions/checkout@v4

      - name: Build QEMU-UAE PPC plugin
        run: |
          set -euo pipefail

          mkdir -p "${ARTIFACT_DIR}"

          export QEMU_UAE_WORK_DIR="${BUILD_DIR}/qemu-uae"
          export QEMU_UAE_NINJA="$(command -v ninja)"

          ./build-qemu-uae-plugin.sh \
            --clean \
            --output "${ARTIFACT_DIR}/qemu-uae.so" \
            --jobs "$(getconf _NPROCESSORS_ONLN)"

          strip --strip-unneeded "${ARTIFACT_DIR}/qemu-uae.so"
          file "${ARTIFACT_DIR}/qemu-uae.so"

      - name: Upload QEMU-UAE PPC plugin
        uses: actions/upload-artifact@v4
        with:
          name: qemu-uae-ubuntu-26.04
          path: artifacts/ubuntu-26.04/qemu-uae.so
          if-no-files-found: error
