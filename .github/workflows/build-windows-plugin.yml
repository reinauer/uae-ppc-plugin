name: Build Windows QEMU-UAE PPC plugin

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  build-windows-plugin:
    name: Build Windows ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: 32-bit
            runner: windows-latest
            msystem: MINGW32
            package_prefix: mingw-w64-i686
            host_cpu: i386
            artifact: qemu-uae-windows-32bit
            dll_name: qemu_uae.dll
            qemu_version: 9.2.4
            qemu_sha256: f3cc1c4eabfdb288218ac3e33763dbe9e276d8bc890b867a2335d58de2ddd39a
            extra_patch_dir: patches-qemu-9.2.4
            pdb: false
          - label: 64-bit
            runner: windows-latest
            msystem: CLANG64
            package_prefix: mingw-w64-clang-x86_64
            host_cpu: x86_64
            artifact: qemu-uae-windows-64bit
            dll_name: qemu_uae_x64.dll
            qemu_version: 11.0.1
            qemu_sha256: 0d235f5820278d914a3155ec27af8e4258d697ea892895570807d69c0cb8cd64
            extra_patch_dir: ""
            pdb: false
          - label: ARM64
            runner: windows-11-arm
            msystem: CLANGARM64
            package_prefix: mingw-w64-clang-aarch64
            host_cpu: aarch64
            artifact: qemu-uae-windows-arm64
            dll_name: qemu_uae_arm64.dll
            qemu_version: 11.0.1
            qemu_sha256: 0d235f5820278d914a3155ec27af8e4258d697ea892895570807d69c0cb8cd64
            extra_patch_dir: ""
            pdb: false

    defaults:
      run:
        shell: msys2 {0}

    steps:
      - name: Checkout QEMU-UAE PPC plugin builder
        uses: actions/checkout@v4

      - name: Install MSYS2 build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            base-devel
            curl
            diffutils
            file
            git
            patch
            tar
            xz
            ${{ matrix.package_prefix }}-glib2
            ${{ matrix.package_prefix }}-meson
            ${{ matrix.package_prefix }}-ninja
            ${{ matrix.package_prefix }}-pkgconf
            ${{ matrix.package_prefix }}-python
            ${{ matrix.package_prefix }}-python-distlib
            ${{ matrix.package_prefix }}-python-pip
            ${{ matrix.package_prefix }}-toolchain

      - name: Build QEMU-UAE PPC plugin
        run: |
          set -euo pipefail

          workspace="$(cygpath -u "${GITHUB_WORKSPACE}")"
          artifact_dir="${workspace}/artifacts/${{ matrix.artifact }}"
          plugin_name="${{ matrix.dll_name }}"
          plugin_path="${artifact_dir}/${plugin_name}"
          plugin_base="${plugin_name%.dll}"
          mkdir -p "${artifact_dir}"

          export QEMU_UAE_WORK_DIR="${workspace}/build/${{ matrix.msystem }}"
          export QEMU_UAE_NINJA="$(command -v ninja)"
          export QEMU_UAE_QEMU_VERSION="${{ matrix.qemu_version }}"
          export QEMU_UAE_QEMU_SHA256="${{ matrix.qemu_sha256 }}"
          if [[ "${{ matrix.pdb }}" == "true" ]]; then
            export QEMU_UAE_PDB=1
            export QEMU_UAE_OUTPUT_PDB="${artifact_dir}/${plugin_base}.pdb"
          fi
          if [[ -n "${{ matrix.extra_patch_dir }}" ]]; then
            export QEMU_UAE_EXTRA_PATCH_DIR="${workspace}/${{ matrix.extra_patch_dir }}"
          fi

          if [[ "${QEMU_UAE_QEMU_VERSION}" == "9.2.4" ]]; then
            python -m pip install \
              --disable-pip-version-check \
              pycotap==1.3.1
          fi

          ./build-qemu-uae-plugin.sh \
            --clean \
            --output "${plugin_path}" \
            --jobs "$(nproc)" \
            -- \
            --cpu="${{ matrix.host_cpu }}"

          if [[ -z "${QEMU_UAE_PDB:-}" ]]; then
            strip "${plugin_path}"
          fi
          file "${plugin_path}"
          if [[ -n "${QEMU_UAE_PDB:-}" ]]; then
            file "${artifact_dir}/${plugin_base}.pdb"
          fi

          ldd_output="${QEMU_UAE_WORK_DIR}/qemu-uae.ldd.txt"
          ldd "${plugin_path}" | tee "${ldd_output}"
          imports_output="${QEMU_UAE_WORK_DIR}/qemu-uae.imports.txt"
          objdump -p "${plugin_path}" |
            awk -F': ' '/DLL Name:/ { print $2 }' |
            tee "${imports_output}"
          msys2_deps="$(
            awk '/=>/ { print $3 } /^[[:space:]]*\// { print $1 }' \
              "${ldd_output}" |
            grep -E '^/(mingw|ucrt|clang|msys)[^/]*/.*[.]dll$' || true
          )"
          if [[ -n "${msys2_deps}" ]]; then
            echo "${plugin_name} still depends on MSYS2 DLLs:" >&2
            echo "${msys2_deps}" >&2
            exit 1
          fi
          imported_msys2_deps="$(
            grep -Ei \
              '^(zlib1|lib(glib|gmodule|gobject|gthread|gio|intl|iconv|pcre2|winpthread|gcc|stdc[+][+]))[-_.0-9A-Za-z]*[.]dll$' \
              "${imports_output}" || true
          )"
          if [[ -n "${imported_msys2_deps}" ]]; then
            echo "${plugin_name} imports MSYS2 runtime DLLs:" >&2
            echo "${imported_msys2_deps}" >&2
            exit 1
          fi

          ls -la "${artifact_dir}"

      - name: Upload QEMU-UAE PPC plugin
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: artifacts/${{ matrix.artifact }}
          if-no-files-found: error
